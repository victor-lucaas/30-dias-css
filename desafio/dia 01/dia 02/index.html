<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Loader animado feito com HTML e CSS">
    <meta name="keywords" content="loader, loading, css, animacao">
    <meta name="author" content="Milena Carecho">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Loader animado</title>
</head>
<body>
    <main class="screen">
        <section class="loader-card" aria-label="Loader animado">
            <div class="loader" role="img" aria-label="Carregamento em 0 por cento">
                <span class="percent">0%</span>
            </div>

            <p class="loading">Loading...</p>
        </section>
    </main>

    <script>
        const loader = document.querySelector(".loader");
        const percent = document.querySelector(".percent");
        let progress = 0;

        setInterval(() => {
            progress = progress < 100 ? progress + 1 : 0;
            loader.style.setProperty("--progress", `${progress}%`);
            loader.setAttribute("aria-label", `Carregamento em ${progress} por cento`);
            percent.textContent = `${progress}%`;
        }, 45);
    </script>
</body>
</html>
